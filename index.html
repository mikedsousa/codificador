<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codificador</title>
    <link rel="stylesheet" href="src/css/reset.css">
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <header>
        <img src="src/img/logo-a.svg" alt="Logo">
    </header>

    <main>
        <section>
            <div class="input-box">
                <textarea class="input-text" placeholder="Digite seu texto" maxlength="150"></textarea>
            </div>
            <p class="rules">Apenas letras minúsculas e sem acento.</p>
            <div class="buttons">
                <button class="button crypt">Criptografar</button>
                <button class="button decrypt">Descriptografar</button>
            </div>
        </section>
      
        <div class="output-text">
            
        </div>
    </main>

    <footer>
        <p class="footer">Desenvolvido por <a href="https://www.linkedin.com/in/mike-de-sousa/" target="_blank">Mike de Sousa</a> | 2023</p>
    </footer>

    <script src="src/js/index.js"></script>
</body>
</html>
